<!DOCTYPE html>
<html>
<head>
    <title>SyncLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2>Sync<span>Link</span></h2>

    <input type="text" id="search" placeholder="Search novels...">
    <button onclick="searchFunction()">Search</button>

    <button onclick="login()">Login</button>
</div>

<!-- Banner -->
<div class="banner">
    <h1>Welcome to SyncLink</h1>
    <p>Read your favorite novels online 📚</p>
</div>

<!-- Main -->
<div class="main">

    <!-- Left -->
    <div class="books" id="bookList"></div>

    <!-- Right Sidebar -->
    <div class="sidebar">
        <h3>Top Novels</h3>
        <ul>
            <li>Solo Leveling</li>
            <li>Shadow Slave</li>
            <li>Lord of the Mysteries</li>
        </ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
